name: ClaritySpend
options:
  bundleIdPrefix: com.clarityspend
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ClaritySpend:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ClaritySpend
        excludes:
          - "**/*.plist"
    resources:
      - path: ClaritySpend/Resources/Assets.xcassets
      - path: ClaritySpend/Info.plist
    info:
      path: ClaritySpend/Info.plist
      properties:
        CFBundleDisplayName: ClaritySpend
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: "ClaritySpend uses the camera to scan receipts for quick expense entry."
        NSPhotoLibraryUsageDescription: "ClaritySpend can access your photos to attach receipts to transactions."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clarityspend.app
        INFOPLIST_FILE: ClaritySpend/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
